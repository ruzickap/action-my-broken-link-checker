---
# GitHub Actions workflow for PR size labeling
# Automatically labels pull requests based on the number of changed lines
# https://github.com/CodelyTV/pr-size-labeler
name: pr-size-labeler

on:
  workflow_dispatch:
  pull_request:

permissions: read-all

jobs:
  pr-size-labeler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1.10.4
